services:
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - ~/.n8n:/home/node/.n8n
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_PUBLIC_API_ENABLED=true

  n8n-mcp:
    build: ./n8n-mcp
    environment:
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_BASE_URL=http://n8n:5678
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
    stdin_open: true
    profiles:
      - mcp
